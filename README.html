<!DOCTYPE html>
<html>
<head>
    <title>GadgetMart</title>
    <link rel="stylesheet" href="style.css">
    </head>
<body>
    <header>
        <h1>GadgetMart</h1>
    </header>
    <figure class="card">
        <img src="smartphn.jpg" alt="Smart Phone" width="200">
        <figcaption class="title">
            Smart Phone
        </figcaption>
        <p class="price">₹20,000</p>
        <ul>
            <li>6.5 inch display</li>
            <li>128 GB storage</li>
            <li>5000 mAh battery</li>
        </ul>
    </figure>
    <br><br>
    <figure class="card">
        <img src="laptop.png" alt="Laptop" width="200">
        <figcaption class="title">
            Laptop
        </figcaption>
        <p class="price">₹45,000</p>
        <ul>
            <li>Intel Processor</li>
            <li>8 GB RAM</li>
            <li>512 GB SSD</li>
        </ul>
    </figure>
    <br><br>
    <figure class="card">
    <img src="smartwatch.jpg" alt="Smart Watch" width="200">
    <figcaption class="title">
        Smart Watch
    </figcaption>
    <p class="price">₹5,000</p>
    <ul>
        <li>Heart Rate Monitor</li>
        <li>Fitness Tracking</li>
        <li>Water Resistant</li>
    </ul>
</figure>
</body>
</html>
